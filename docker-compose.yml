version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: secure_chat_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-secure_chat}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-secure_chat}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: secure_chat_server
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-secure_chat}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-supersecretrefreshkey}
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: secure_chat_client
    ports:
      - "80:80"        # Maps HTTP (80)
      - "5173:80"      # Maps 5173 to Nginx 80 (For backward compatibility with users used to Vite port)
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
